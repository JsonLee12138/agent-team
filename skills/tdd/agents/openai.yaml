interface:
  display_name: "TDD"
  short_description: "Acceptance-first TDD workflow for solo work"
  default_prompt: "Use $tdd to handle this task with an acceptance-first TDD workflow: read context, define acceptance, write failing tests when feasible, implement, verify, and conclude with passed, failed, or skipped with reason. Do not default to E2E; use E2E only when explicitly requested, required by the task contract, or when lower-cost verification cannot cover the risk. When test-case design, regression planning, or broader QA execution is needed, use qa-expert."
